name: Build Nginx and PHP images (u24 + u26)
run-name: Build and publish u24/u26 image matrix
on: [push]

env:
  IMAGE: ownercz/nginx-php
  DEFAULT_PHP: "8.5"
  U26_CODENAME: resolute

jobs:
  Build-Ubuntu-PHP-Image:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: ['u24', 'u26']
        php: ['8.2', '8.3', '8.4', '8.5']
        exclude:
          - variant: 'u26'
            php: '8.2'
          - variant: 'u26'
            php: '8.3'
          - variant: 'u26'
            php: '8.4'
    steps:
      - name: Prepare | Setup git
        run: |
              git config --global user.name "Radim Lipovcan"
              git config --global user.email "radim@lipovcan.cz"

      - name: Build | Install Docker
        run: |
              git clone https://github.com/Ownercz/ubuntu-nginx-php.git .
              apt-get update && apt-get install docker.io -y

      - name: Docker | Build variant
        env:
          VARIANT: ${{ matrix.variant }}
          PHP_VERSION: ${{ matrix.php }}
        run: |
              set -euo pipefail

              # ---- Variant and provenance metadata -----------------------------
              OS_TAG="${VARIANT}"
              hash="${GITHUB_SHA:-$(git rev-parse HEAD)}"
              hashed="${hash:0:10}"
              build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

              echo "IMAGE        = ${IMAGE}"
              echo "OS_TAG       = ${OS_TAG}"
              echo "PHP_VERSION  = ${PHP_VERSION}"
              echo "DEFAULT_PHP  = ${DEFAULT_PHP}"
              echo "U26_CODENAME = ${U26_CODENAME}"
              echo "SHORT_SHA    = ${hashed}"
              echo "BUILD_DATE   = ${build_date}"

              # ---- Login & buildx ----------------------------------------------
              echo "${{ secrets.DOCKERHUB_GITEA_TOKEN }}" | docker login -u ownercz --password-stdin

              cd "${VARIANT}"
              ls -lah

              docker buildx rm multiarch-builder 2>/dev/null || true
              docker buildx create --name multiarch-builder --driver docker-container --use
              docker buildx inspect --bootstrap
              docker buildx ls

              # ---- Tag matrix ---------------------------------------------------
              TAGS=()
              add_tag() { TAGS+=(--tag "${IMAGE}:$1"); echo "  + $1"; }

              echo "Tags to push:"

              # Per-PHP, OS-pinned (always)
              add_tag "${OS_TAG}-php${PHP_VERSION}"
              add_tag "${OS_TAG}-php${PHP_VERSION}-${hashed}"

              # Per-PHP floating tags track the newest OS line that supports the PHP minor.
              if [ "${OS_TAG}" = "u26" ] || [ "${PHP_VERSION}" != "${DEFAULT_PHP}" ]; then
                  add_tag "php${PHP_VERSION}"
              fi

              # Default-PHP-only tags
              if [ "${PHP_VERSION}" = "${DEFAULT_PHP}" ]; then
                  add_tag "${OS_TAG}"
                  add_tag "${OS_TAG}-${hashed}"

                  # Keep latest bound to u26 default only.
                  if [ "${OS_TAG}" = "u26" ]; then
                      add_tag "latest"
                  fi
              fi

              # ---- Build & push -------------------------------------------------
              BUILD_ARGS=(
                  --file Dockerfile
                  --build-arg "PHP_VERSION=${PHP_VERSION}"
                  --build-arg "VCS_REF=${hash}"
                  --build-arg "BUILD_DATE=${build_date}"
              )

              if [ "${OS_TAG}" = "u26" ]; then
                  BUILD_ARGS+=(--build-arg "UBUNTU_CODENAME=${U26_CODENAME}")
                  echo "Using u26 apt repository codename: ${U26_CODENAME}"
              fi

              docker buildx build \
                  --platform linux/amd64,linux/arm64 \
                  "${BUILD_ARGS[@]}" \
                  "${TAGS[@]}" \
                  --push \
                  --progress=plain \
                  .

              # ---- Verify -------------------------------------------------------
              docker buildx imagetools inspect "${IMAGE}:${OS_TAG}-php${PHP_VERSION}"
